name: Deploy PR Preview

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  preview:
    runs-on: ubuntu-latest
    env:
      SHOPIFY_FLAG_FORCE: '1'
      SHOPIFY_CLI_TTY: '0'
    permissions:
      pull-requests: write
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Shopify CLI
        run: npm install -g @shopify/cli

      - name: Push to preview theme
        id: push
        env:
          SHOPIFY_CLI_THEME_TOKEN: ${{ secrets.SHOPIFY_CLI_THEME_TOKEN }}
          RAW_SHOPIFY_STORE: ${{ secrets.SHOPIFY_STORE }}
          PREVIEW_THEME_ID: ${{ secrets.SHOPIFY_PREVIEW_THEME_ID }}
        run: |
          set -euo pipefail
          STORE="$(printf '%s' "$RAW_SHOPIFY_STORE" | head -n1 | tr -d '\r' | xargs)"
          if [ -z "$STORE" ]; then
            echo "SHOPIFY_STORE secret is empty after trimming" >&2
            exit 1
          fi
          if [ -z "$PREVIEW_THEME_ID" ]; then
            echo "SHOPIFY_PREVIEW_THEME_ID secret is not set" >&2
            exit 1
          fi
          export SHOPIFY_FLAG_STORE="$STORE"
          shopify theme push \
            --theme "$PREVIEW_THEME_ID" \
            --store "$STORE" \
            --password "$SHOPIFY_CLI_THEME_TOKEN" \
            --force
          echo "preview_url=https://$STORE/?preview_theme_id=$PREVIEW_THEME_ID" >> "$GITHUB_OUTPUT"

      - name: Comment preview link on PR
        uses: actions/github-script@v7
        with:
          script: |
            const url = `${{ steps.push.outputs.preview_url }}`;
            const marker = '<!-- pr-preview-comment -->';
            const body = `${marker}\n### 🔍 Preview deployed\n\n[View this change on the preview theme](${url})\n\nThis is a live, rendered preview — check it before merging. Merging this PR pushes the change to the **live storefront**.`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body && c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
