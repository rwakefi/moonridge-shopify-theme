# Deploys the theme to Shopify when code is merged to main.
# Requires repository secrets: SHOPIFY_STORE, SHOPIFY_THEME_ID, SHOPIFY_CLI_THEME_TOKEN
# See: https://shopify.dev/docs/storefronts/themes/tools/cli/ci-cd

name: Deploy to Shopify

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SHOPIFY_FLAG_FORCE: '1'
      SHOPIFY_CLI_TTY: '0'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Shopify CLI
        run: npm install -g @shopify/cli

      - name: Push theme to store
        env:
          SHOPIFY_CLI_THEME_TOKEN: ${{ secrets.SHOPIFY_CLI_THEME_TOKEN }}
          RAW_SHOPIFY_STORE: ${{ secrets.SHOPIFY_STORE }}
        run: |
          set -euo pipefail
          # Trim whitespace and accidental newlines in SHOPIFY_STORE (breaks CLI HTTP headers if pasted with CR/LF)
          STORE="$(printf '%s' "$RAW_SHOPIFY_STORE" | head -n1 | tr -d '\r' | xargs)"
          if [ -z "$STORE" ]; then
            echo "SHOPIFY_STORE secret is empty after trimming" >&2
            exit 1
          fi
          export SHOPIFY_FLAG_STORE="$STORE"
          shopify theme push \
            --json \
            --theme "${{ secrets.SHOPIFY_THEME_ID }}" \
            --store "$STORE" \
            --password "$SHOPIFY_CLI_THEME_TOKEN" \
            --allow-live \
            --force
