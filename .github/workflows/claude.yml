name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read # Required for Claude to read CI results on PRs
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          # AUTH — pick ONE of the two lines below, and add the matching
          # secret under Settings > Secrets and variables > Actions.
          #
          # Option A (Pro/Max subscription): generate by running
          #   claude setup-token
          # locally, then save it as the CLAUDE_CODE_OAUTH_TOKEN secret.
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          #
          # Option B (API billing): get a key from console.anthropic.com
          # and save it as the ANTHROPIC_API_KEY secret, then comment out
          # the line above and uncomment this one:
          # anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}

          # Optional: change the trigger phrase (default: @claude)
          # trigger_phrase: "/claude"

          # Optional: constrain Claude's behavior
          # claude_args: |
          #   --max-turns 10
